name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Lint & test
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Test
        env:
          DJANGO_SECRET_KEY: ci-secret-key-not-used-in-production
        run: uv run pytest

  accessibility:
    runs-on: ubuntu-latest
    name: Accessibility (pa11y WCAG2AA)
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Migrate the database
        env:
          DJANGO_SECRET_KEY: ci-secret-key-not-used-in-production
        run: uv run python manage.py migrate

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Serve and audit with pa11y-ci
        env:
          DJANGO_SECRET_KEY: ci-secret-key-not-used-in-production
          DJANGO_DEBUG: "True"
        run: |
          uv run python manage.py runserver 127.0.0.1:8080 &
          npx --yes wait-on http://127.0.0.1:8080/
          npx --yes pa11y-ci \
            --sitemap http://127.0.0.1:8080/sitemap.xml \
            --sitemap-find https://flu.ke \
            --sitemap-replace http://127.0.0.1:8080

  bump-version:
    runs-on: ubuntu-latest
    name: "Bump version and create changelog with commitizen"
    needs: [test, accessibility]
    if: github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'bump:')
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create bump and changelog
        uses: commitizen-tools/commitizen-action@master
        with:
          push: false

      - name: Configure git for HTTPS push
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push using HTTPS
        run: |
          git push origin main --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
