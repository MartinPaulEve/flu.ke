name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Lint & test
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Test
        env:
          DJANGO_SECRET_KEY: ci-secret-key-not-used-in-production
        run: uv run pytest

  accessibility:
    runs-on: ubuntu-latest
    name: Accessibility (pa11y WCAG2AA)
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Build the static site
        env:
          DJANGO_SECRET_KEY: ci-secret-key-not-used-in-production
        run: |
          uv run python manage.py migrate
          uv run python manage.py build_site --no-media

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Serve and audit with pa11y-ci
        run: |
          npx --yes http-server dist -p 8080 -s &
          npx --yes wait-on http://localhost:8080/index.html
          npx --yes pa11y-ci \
            --sitemap http://localhost:8080/sitemap.xml \
            --sitemap-find https://flu.ke \
            --sitemap-replace http://localhost:8080
