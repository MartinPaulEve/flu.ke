# Production stack for the Fluke CMS / live site — gunicorn only.
#
#   docker compose -f compose.prod.yaml --env-file .env.prod up -d --build
#
# TLS and routing are handled by a SEPARATE, shared Traefik instance (running
# multiple sites) that discovers this container via Docker labels. This stack
# therefore runs only gunicorn: it publishes no host ports and joins the shared
# Traefik network so that Traefik can reach it.
#
#   Internet ──HTTPS──> (shared) Traefik ──HTTP──> fluke-web :8000 (gunicorn)
#
# The shared Traefik terminates TLS and forwards X-Forwarded-Proto=https, which
# config.settings_production's SECURE_PROXY_SSL_HEADER reads (secure cookies,
# correct absolute URLs). Match your Traefik via TRAEFIK_NETWORK / TRAEFIK_ENTRYPOINT
# / TRAEFIK_CERTRESOLVER in .env.prod (or edit the labels). See docs/deploy-docker.md.
#
# Secrets/config come from the environment (see .env.prod.example). The `:?` form
# makes compose refuse to start if a required value is missing. Load them with
# `--env-file .env.prod`.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        # The container runs as this non-root user. Bind-mounted host dirs keep
        # the HOST's ownership, so $DATA_DIR/db and $DATA_DIR/media MUST be owned
        # by this UID/GID on the host (see below). Override for a non-1000 host:
        #   UID=$(id -u) GID=$(id -g) docker compose -f compose.prod.yaml build
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    image: flukecms:prod
    container_name: fluke-web
    environment:
      DJANGO_SETTINGS_MODULE: "config.settings_production"
      # Required — no insecure fallback. Generate one and put it in .env.prod:
      #   python -c "import secrets; print(secrets.token_urlsafe(50))"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY in .env.prod}"
      # SQLite on the persistent /data volume (WAL/SHM files live there too).
      DATABASE_URL: "${DATABASE_URL:-sqlite:////data/db.sqlite3}"
      SITE_NAME: "${SITE_NAME:-Fluke}"
      # The canonical origin — https://fluke.fm in production.
      SITE_BASE_URL: "${SITE_BASE_URL:?set SITE_BASE_URL in .env.prod}"
      # Optional. The Traefik router Host() rules below already gate traffic; these
      # make Django's host/CSRF checks accept the same hostnames.
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-fluke.fm,www.fluke.fm}"
      CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS:-https://fluke.fm,https://www.fluke.fm}"
      MUSICBRAINZ_CONTACT: "${MUSICBRAINZ_CONTACT:-}"
      # Optional one-shot admin creation (entrypoint). Leave the password unset on
      # the long-running service; create the admin with a one-off run instead:
      #   docker compose -f compose.prod.yaml run --rm \
      #     -e DJANGO_SUPERUSER_USERNAME=admin -e DJANGO_SUPERUSER_PASSWORD=… web true
    expose:
      # Internal only — the shared Traefik reaches this on the shared network.
      - "8000"
    volumes:
      # Host bind mounts of a data directory OUTSIDE the git checkout (default a
      # sibling of the repo: /srv/fluke -> /srv/fluke-data). Override DATA_DIR
      # with an absolute path in .env.prod. UNLIKE named volumes, bind mounts use
      # the HOST dir's real ownership — create and chown these to the container's
      # UID/GID (1000:1000 by default) BEFORE the first `up`, or Docker creates
      # them as root and `migrate` cannot write the DB:
      #   mkdir -p "$DATA_DIR"/db "$DATA_DIR"/media
      #   sudo chown -R 1000:1000 "$DATA_DIR"
      #
      # The SQLite db.sqlite3 (and its -wal/-shm) live at $DATA_DIR/db on the
      # host; the path matches DATABASE_URL=sqlite:////data/db.sqlite3.
      - "${DATA_DIR:-../fluke-data}/db:/data"
      # Uploaded media persists on the host, separate from the image.
      - "${DATA_DIR:-../fluke-data}/media:/app/media"
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      # Which network the shared Traefik should use to reach this container.
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik}"
      # Route the apex + www on your Traefik's HTTPS entrypoint. TLS is terminated
      # by the shared Traefik (at the entrypoint), so no tls/certresolver here.
      - "traefik.http.routers.fluke.rule=Host(`fluke.fm`) || Host(`www.fluke.fm`)"
      - "traefik.http.routers.fluke.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.fluke.middlewares=fluke-www"
      # Redirect www -> apex (301), preserving the path. $${1} escapes compose
      # interpolation so Traefik receives the literal ${1} capture group.
      - "traefik.http.middlewares.fluke-www.redirectregex.regex=^https?://www\\.fluke\\.fm/(.*)"
      - "traefik.http.middlewares.fluke-www.redirectregex.replacement=https://fluke.fm/$${1}"
      - "traefik.http.middlewares.fluke-www.redirectregex.permanent=true"
      - "traefik.http.services.fluke.loadbalancer.server.port=8000"
    restart: unless-stopped

networks:
  # The shared network your Traefik instance watches. It must ALREADY EXIST
  # (created by the Traefik stack); set TRAEFIK_NETWORK to its name.
  traefik:
    external: true
    name: "${TRAEFIK_NETWORK:-traefik}"
