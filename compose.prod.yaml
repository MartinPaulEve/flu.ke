# Production stack for the Fluke CMS / live site.
#
#   docker compose -f compose.prod.yaml --env-file .env.prod up -d --build
#
# Topology — Traefik is the edge and terminates TLS itself:
#
#   Internet ──HTTPS──> Traefik :443 (TLS, Let's Encrypt) ──HTTP──> web :8000 (gunicorn)
#                       :80 → 301 redirect to HTTPS (and the ACME challenge)
#
# Traefik obtains/renews certificates from Let's Encrypt (HTTP-01 challenge on
# :80) and terminates TLS, then forwards to gunicorn on the internal network with
# X-Forwarded-Proto=https — which config.settings_production's
# SECURE_PROXY_SSL_HEADER reads (secure cookies, correct absolute URLs).
#
# REQUIREMENTS: ports 80 AND 443 must be open to the internet, and DNS A/AAAA
# records for fluke.fm and www.fluke.fm must point at this host (the HTTP-01
# challenge and cert issuance need that before HTTPS will work).
#
# Secrets/config come from the environment (see .env.prod.example). The `:?` form
# makes compose refuse to start if a required value is missing. Load them with
# `--env-file .env.prod`. See docs/deploy-docker.md.

services:
  traefik:
    image: traefik:v3.6.1
    container_name: fluke-traefik
    environment:
      # Pin the Docker client API version Traefik talks to the daemon with (newer
      # Docker Engines reject the old 1.24 default). Override via .env.prod if needed.
      DOCKER_API_VERSION: "${DOCKER_API_VERSION:-1.44}"
    command:
      # Docker provider — only containers with traefik.enable=true are routed.
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # HTTP entrypoint: serves the ACME challenge, and redirects everything else
      # to HTTPS (the site does not serve plain HTTP).
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # HTTPS entrypoint — TLS is terminated here.
      - "--entrypoints.websecure.address=:443"
      # Let's Encrypt via the HTTP-01 challenge on the web entrypoint; the issued
      # certificates (acme.json) persist on the `letsencrypt` volume.
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL:?set ACME_EMAIL in .env.prod}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Read-only access to the Docker API so Traefik can discover the web service.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persist issued certificates (acme.json) across restarts/rebuilds.
      - letsencrypt:/letsencrypt
    networks:
      - web
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        # The container runs as this non-root user. Bind-mounted host dirs keep
        # the HOST's ownership, so $DATA_DIR/db and $DATA_DIR/media MUST be owned
        # by this UID/GID on the host (see below). Override for a non-1000 host:
        #   UID=$(id -u) GID=$(id -g) docker compose -f compose.prod.yaml build
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    image: flukecms:prod
    container_name: fluke-web
    environment:
      DJANGO_SETTINGS_MODULE: "config.settings_production"
      # Required — no insecure fallback. Generate one and put it in .env.prod:
      #   python -c "import secrets; print(secrets.token_urlsafe(50))"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY in .env.prod}"
      # SQLite on the persistent /data volume (WAL/SHM files live there too).
      DATABASE_URL: "${DATABASE_URL:-sqlite:////data/db.sqlite3}"
      SITE_NAME: "${SITE_NAME:-Fluke}"
      # The canonical origin — https://fluke.fm in production.
      SITE_BASE_URL: "${SITE_BASE_URL:?set SITE_BASE_URL in .env.prod}"
      # Optional. The router Host() rules below already gate traffic; these make
      # Django's host/CSRF checks accept the same hostnames.
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-fluke.fm,www.fluke.fm}"
      CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS:-https://fluke.fm,https://www.fluke.fm}"
      MUSICBRAINZ_CONTACT: "${MUSICBRAINZ_CONTACT:-}"
      # Optional one-shot admin creation (entrypoint). Leave the password unset on
      # the long-running service; create the admin with a one-off run instead:
      #   docker compose -f compose.prod.yaml run --rm \
      #     -e DJANGO_SUPERUSER_USERNAME=admin -e DJANGO_SUPERUSER_PASSWORD=… web true
    expose:
      # Internal only — Traefik reaches it on the shared network. Never published.
      - "8000"
    volumes:
      # Host bind mounts of a data directory OUTSIDE the git checkout (default a
      # sibling of the repo: /srv/fluke -> /srv/fluke-data). Override DATA_DIR
      # with an absolute path in .env.prod. UNLIKE named volumes, bind mounts use
      # the HOST dir's real ownership — create and chown these to the container's
      # UID/GID (1000:1000 by default) BEFORE the first `up`, or Docker creates
      # them as root and `migrate` cannot write the DB:
      #   mkdir -p "$DATA_DIR"/db "$DATA_DIR"/media
      #   sudo chown -R 1000:1000 "$DATA_DIR"
      #
      # The SQLite db.sqlite3 (and its -wal/-shm) live at $DATA_DIR/db on the
      # host; the path matches DATABASE_URL=sqlite:////data/db.sqlite3.
      - "${DATA_DIR:-../fluke-data}/db:/data"
      # Uploaded media persists on the host, separate from the image.
      - "${DATA_DIR:-../fluke-data}/media:/app/media"
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # Route the apex and www over HTTPS, with a Let's Encrypt certificate.
      - "traefik.http.routers.fluke.rule=Host(`fluke.fm`) || Host(`www.fluke.fm`)"
      - "traefik.http.routers.fluke.entrypoints=websecure"
      - "traefik.http.routers.fluke.tls=true"
      - "traefik.http.routers.fluke.tls.certresolver=le"
      - "traefik.http.services.fluke.loadbalancer.server.port=8000"
    restart: unless-stopped

networks:
  web:

volumes:
  # Let's Encrypt certificate storage (acme.json). Ephemeral — re-issued on a new
  # host — so a Docker-managed named volume rather than the $DATA_DIR bind mount.
  letsencrypt:
