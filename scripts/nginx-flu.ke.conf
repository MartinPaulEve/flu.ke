# nginx config for serving the generated static site at flu.ke.
# The site is plain files (no app, no DB) rsynced from dist/ by scripts/deploy.sh.

server {
    listen 443 ssl http2;
    server_name flu.ke www.flu.ke;

    # ssl_certificate / ssl_certificate_key managed by certbot or your provider.

    root /var/www/flu.ke;
    index index.html;
    charset utf-8;

    # MIME types the default set may miss (the media library has these).
    types {
        application/vnd.rar           rar;
        application/zip               zip;
        audio/mpeg                    mp3;
        audio/flac                    flac;
        audio/x-wav                   wav;
        image/webp                    webp;
        application/rss+xml           xml;
    }

    # Clean URLs: /news/2009/slug/ -> /news/2009/slug/index.html
    location / {
        try_files $uri $uri/ =404;
    }

    # Long-cache fingerprint-stable assets and the (rarely-changing) media library.
    location ~* ^/(static|media)/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Allow hotlink-friendly downloads of audio/archives.
        location ~* \.(rar|zip|mp3|flac|wav|mp4)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # HTML and feeds: short cache so published edits appear quickly.
    location ~* \.(html|xml|txt)$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # Security headers (static site; CSP kept simple — assets are first-party).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

server {
    listen 80;
    server_name flu.ke www.flu.ke;
    return 301 https://flu.ke$request_uri;
}
