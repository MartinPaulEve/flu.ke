{# Open Graph + Twitter meta for non-model pages (home, section indexes).
   Params: og_title, og_description, og_image_path (static path, defaults to the
   site card), og_type (defaults to "website"). #}
{% load static %}
{% if og_description %}<meta name="description" content="{{ og_description }}">{% endif %}
<link rel="canonical" href="{{ site_base_url }}{{ request.path }}">
<meta property="og:site_name" content="{{ site_name }}">
<meta property="og:title" content="{{ og_title|default:site_name }}">
{% if og_description %}<meta property="og:description" content="{{ og_description }}">{% endif %}
<meta property="og:type" content="{{ og_type|default:'website' }}">
<meta property="og:url" content="{{ site_base_url }}{{ request.path }}">
<meta property="og:image" content="{{ site_base_url }}{% static og_image_path|default:'og-default.png' %}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
