# Local CMS for flu.ke — the private editing tool for the live Django site.
#
#   docker compose up --build            # admin at http://localhost:8000/admin/
#   docker compose exec cms python manage.py import_discography
#   docker compose exec cms python manage.py import_media        # ~10 GB; once
#   docker compose exec cms python manage.py import_blog         # Wayback (network)
#   docker compose exec cms python manage.py createsuperuser     # if not auto-created
#
# The repo is bind-mounted, so db.sqlite3 and media/ persist on the host and
# Ingest/ is available to the import commands. SQLite suits a single editor;
# point DATABASE_URL at MySQL if you ever need more.
#
# An optional `db` (MariaDB) service is included for a local MySQL dry-run before
# migrating the live host — see docs/mysql-migration.md. It is OFF by default:
# nothing starts it unless you ask for it, and `cms` keeps using SQLite. To use it,
# set the MYSQL_* vars in .env and start it explicitly, e.g.:
#   docker compose up -d db
#   DATABASE_URL="mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}" \
#     docker compose run --rm cms python manage.py migrate

services:
  cms:
    build:
      context: .
      args:
        # Match the container user to your host user so bind-mounted files
        # (db.sqlite3, media/) are owned by you, not root. Override for a
        # non-1000 host: `UID=$(id -u) GID=$(id -g) docker compose build`.
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    image: flukecms:local
    container_name: fluke-cms
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    ports:
      # Loopback only — this is a private editing tool, never exposed on the LAN.
      # Host port is configurable (set CMS_PORT in .env if 8000 is taken); the
      # container always listens on 8000 internally.
      - "127.0.0.1:${CMS_PORT:-8000}:8000"
    environment:
      # DEBUG is on so runserver serves static + media for local editing. It is
      # loopback-only above; override to False if you ever bind it more widely.
      DJANGO_DEBUG: "${DJANGO_DEBUG:-True}"
      # Required — no insecure fallback. Generate one and put it in .env:
      #   python -c "import secrets; print(secrets.token_urlsafe(50))"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY in .env}"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      # SQLite is the default. For a local MySQL dry-run, point this at the `db`
      # service below instead (and start it: `docker compose up -d db`):
      #   DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}"
      DATABASE_URL: "${DATABASE_URL:-sqlite:////app/db.sqlite3}"
      SITE_NAME: "${SITE_NAME:-Fluke}"
      SITE_BASE_URL: "${SITE_BASE_URL:-https://flu.ke}"
      MUSICBRAINZ_CONTACT: "${MUSICBRAINZ_CONTACT:-}"
      # Create the admin yourself (keeps no password in the long-running env):
      #   docker compose exec cms python manage.py createsuperuser
    volumes:
      - .:/app                 # live source + db/media/Ingest on the host
      - venv-cache:/app/.venv  # mask any host .venv (the image uses /opt/venv)
    # For the MySQL dry-run, uncomment so cms waits for the db to be healthy. Left
    # commented so the default `up` stays SQLite-only and never pulls in `db`.
    # depends_on:
    #   db:
    #     condition: service_healthy
    restart: unless-stopped

  # Optional MySQL/MariaDB, for a local dry-run of the SQLite→MySQL migration
  # (docs/mysql-migration.md). Behind the `mysql` profile so it does NOT start with
  # a plain `docker compose up` — the default stays SQLite. Bring it up with
  # `docker compose --profile mysql up -d db` (or `docker compose up -d db`, which
  # also activates it). `cms` only reaches it when you pass a mysql DATABASE_URL.
  db:
    profiles: ["mysql"]
    image: mariadb:11
    container_name: fluke-db
    # Server-wide utf8mb4 so a freshly created database matches what loaddata expects.
    command: >-
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    ports:
      # Loopback only — like cms, never exposed on the LAN. Lets host tools (e.g.
      # a mysql client) connect; the cms container reaches it as host `db`.
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    environment:
      # No insecure fallbacks — set these in .env (see .env.example). The `:?` form
      # makes compose refuse to start if a value is missing.
      MARIADB_DATABASE: "${MYSQL_DATABASE:?set MYSQL_DATABASE in .env}"
      MARIADB_USER: "${MYSQL_USER:?set MYSQL_USER in .env}"
      MARIADB_PASSWORD: "${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}"
      MARIADB_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - mysql-data:/var/lib/mysql   # named volume so data survives restarts
    restart: unless-stopped

volumes:
  venv-cache:
  mysql-data:
